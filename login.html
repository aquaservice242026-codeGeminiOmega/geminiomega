<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios Agua Potable - Iniciar Sesión</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>

    <!-- Toastify JS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
        }

        /* Toastify Custom Styles */
        .toastify {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            border-radius: 12px !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15) !important;
            padding: 14px 20px !important;
            min-width: 280px;
            font-size: 14px;
        }

        .toastify-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;
        }

        .toastify-error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%) !important;
        }

        .toastify-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%) !important;
        }

        .toastify-info {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%) !important;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Contenedor Principal -->
    <div class="w-full max-w-md" x-data="loginApp()" x-init="initApp()">

        <!-- Logo y Título -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-20 h-20 rounded-full gradient-bg text-white shadow-lg mb-4">
                <i class="fas fa-tint text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Servicios Agua Potable</h1>
            <p class="text-gray-500 mt-2">Sistema de Gestión de Agua Potabilizada</p>
        </div>

        <!-- Tarjeta de Login -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Iniciar Sesión</h2>

            <form @submit.prevent="handleLogin">
                <!-- Email -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Correo Electrónico</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" x-model="email" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                            placeholder="admin@aquaservice.com">
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" x-model="password" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Botón de Login -->
                <button type="submit" :disabled="loading"
                    class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center">
                    <i x-show="loading" class="fas fa-circle-notch fa-spin mr-2"></i>
                    <span x-text="loading ? 'Ingresando...' : 'Iniciar Sesión'"></span>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-400 text-sm mt-6">
            &copy; 2026 AquaService. Todos los derechos reservados.
        </p>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://wotoslngwrsddohowkba.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvdG9zbG5nd3JzZGRvaG93a2JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMDk5MTksImV4cCI6MjA5ODc4NTkxOX0.zvce9AmOBwPxmtOikfyT0FdbyGF0Szec-AZfTiYqzBs';

        // Inicializar Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('✅ Supabase inicializado');

        // ============================================
        // SISTEMA DE NOTIFICACIONES TOASTIFY
        // ============================================
        function showToast(message, type = 'success') {
            const gradients = {
                success: 'linear-gradient(to right, #10b981, #059669)',
                error: 'linear-gradient(to right, #ef4444, #dc2626)',
                warning: 'linear-gradient(to right, #f59e0b, #d97706)',
                info: 'linear-gradient(to right, #3b82f6, #2563eb)'
            };

            const icons = {
                success: '✓',
                error: '✗',
                warning: '⚠',
                info: 'ℹ'
            };

            Toastify({
                text: `${icons[type]} ${message}`,
                duration: 3000,
                close: true,
                gravity: 'top',
                position: 'right',
                stopOnFocus: true,
                style: {
                    background: gradients[type],
                    borderRadius: '12px',
                    fontFamily: 'Inter, sans-serif',
                    fontWeight: '500',
                    fontSize: '14px',
                    padding: '14px 20px',
                    boxShadow: '0 10px 25px -5px rgba(0, 0, 0, 0.15)',
                    minWidth: '280px'
                }
            }).showToast();
        }

        // ============================================
        // APLICACIÓN LOGIN
        // ============================================
        function loginApp() {
            return {
                email: '',
                password: '',
                loading: false,

                initApp() {
                    // Verificar si ya hay sesión
                    this.checkSession();
                },

                async checkSession() {
                    try {
                        const { data: { session } } = await supabase.auth.getSession();
                        if (session) {
                            window.location.href = 'index.html';
                        }
                    } catch (error) {
                        console.error('Error verificando sesión:', error);
                    }
                },

                async handleLogin() {
                    // Validar campos
                    if (!this.email || !this.password) {
                        showToast('Por favor complete todos los campos', 'warning');
                        return;
                    }

                    this.loading = true;

                    try {
                        const { data, error } = await supabase.auth.signInWithPassword({
                            email: this.email.trim(),
                            password: this.password,
                        });

                        if (error) {
                            // Mensajes personalizados según el error
                            if (error.message.includes('Invalid login credentials')) {
                                showToast('Credenciales incorrectas', 'error');
                            } else if (error.message.includes('Email not confirmed')) {
                                showToast('Email no confirmado', 'warning');
                            } else if (error.message.includes('Too many requests')) {
                                showToast('Demasiados intentos. Espere un momento', 'error');
                            } else {
                                showToast(error.message, 'error');
                            }
                            return;
                        }

                        // Login exitoso
                        if (data.user) {
                            // Verificar perfil del usuario
                            const { data: profile, error: profileError } = await supabase
                                .from('profiles')
                                .select('is_active, role, branch')
                                .eq('id', data.user.id)
                                .single();

                            if (profileError) {
                                throw profileError;
                            }

                            // Verificar si la cuenta está activa
                            if (!profile.is_active) {
                                await supabase.auth.signOut();
                                showToast('Cuenta desactivada. Contacte al administrador.', 'error');
                                return;
                            }

                            // Guardar información en localStorage
                            localStorage.setItem('user_id', data.user.id);
                            localStorage.setItem('user_role', profile.role);
                            localStorage.setItem('user_branch', profile.branch);

                            // Mostrar mensaje de éxito
                            showToast('¡Bienvenido al sistema!', 'success');

                            // Redirigir al dashboard después de 1 segundo
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 1000);
                        }

                    } catch (err) {
                        console.error('Error login:', err);
                        showToast(err.message || 'Error al iniciar sesión', 'error');
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>

</html>
