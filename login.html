<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios Agua Potable - Iniciar Sesión</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <!-- Alertify.js - CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/alertify.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/themes/bootstrap.min.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>

    <!-- Alertify.js - JS (después de todo lo demás) -->
    <script src="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/alertify.min.js"></script>

    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        /* Menú móvil */
        .sidebar-mobile {
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
        }

        .sidebar-mobile.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 39;
        }

        .sidebar-overlay.show {
            display: block;
        }

        /* Mostrar sidebar en pantallas grandes */
        @media (min-width: 1024px) {
            .sidebar-mobile {
                transform: translateX(0) !important;
            }

            .sidebar-overlay {
                display: none !important;
            }

            .menu-toggle {
                display: none !important;
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Contenedor Principal -->
    <div class="w-full max-w-md" x-data="loginApp()" x-init="initApp()">

        <!-- Logo y Título -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-20 h-20 rounded-full gradient-bg text-white shadow-lg mb-4">
                <i class="fas fa-tint text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Servicios Agua Potable</h1>
            <p class="text-gray-500 mt-2">Sistema de Gestión de Agua Potabilizada</p>
        </div>

        <!-- Tarjeta de Login -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Iniciar Sesión</h2>

            <form @submit.prevent="handleLogin">
                <!-- Email -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Correo Electrónico</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" x-model="email" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                            placeholder="admin@aquaservice.com">
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" x-model="password" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Botón de Login -->
                <button type="submit" :disabled="loading"
                    class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center">
                    <i x-show="loading" class="fas fa-circle-notch fa-spin mr-2"></i>
                    <span x-text="loading ? 'Ingresando...' : 'Iniciar Sesión'"></span>
                </button>
            </form>

            <!-- Mensaje de Error -->
            <div x-show="errorMessage" x-transition
                class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm text-center" x-cloak>
                <i class="fas fa-exclamation-circle mr-1"></i>
                <span x-text="errorMessage"></span>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-400 text-sm mt-6">
            &copy; 2026 AquaService. Todos los derechos reservados.
        </p>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://wotoslngwrsddohowkba.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvdG9zbG5nd3JzZGRvaG93a2JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMDk5MTksImV4cCI6MjA5ODc4NTkxOX0.zvce9AmOBwPxmtOikfyT0FdbyGF0Szec-AZfTiYqzBs';

        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase inicializado');
        } catch (error) {
            console.error('❌ Error Supabase:', error);
        }

        function loginApp() {
            return {
                email: '',
                password: '',
                loading: false,
                errorMessage: '',

                initApp() {
                    // Verificar Alertify
                    if (typeof alertify === 'undefined') {
                        console.warn('⚠️ Alertify no cargó, usando alert() nativo');
                        this.useNativeAlerts = true;
                    } else {
                        alertify.set('notifier', { position: 'top-right' });
                        this.useNativeAlerts = false;
                    }

                    this.checkSession();
                },

                async checkSession() {
                    try {
                        const { data: { session } } = await supabase.auth.getSession();
                        if (session) {
                            window.location.href = 'index.html';
                        }
                    } catch (error) {
                        console.error('Error sesión:', error);
                    }
                },

                showSuccess(message) {
                    if (this.useNativeAlerts) {
                        alert('✓ ' + message);
                    } else {
                        alertify.success(message);
                    }
                },

                showError(message) {
                    if (this.useNativeAlerts) {
                        alert('✗ ' + message);
                    } else {
                        alertify.error(message);
                    }
                },

                async handleLogin() {
                    this.loading = true;
                    this.errorMessage = '';

                    try {
                        const { data, error } = await supabase.auth.signInWithPassword({
                            email: this.email.trim(),
                            password: this.password,
                        });

                        if (error) throw error;

                        if (data.user) {
                            const { data: profile, error: profileError } = await supabase
                                .from('profiles')
                                .select('is_active, role, branch')
                                .eq('id', data.user.id)
                                .single();

                            if (profileError) throw profileError;

                            if (!profile.is_active) {
                                await supabase.auth.signOut();
                                throw new Error('Cuenta desactivada. Contacta al administrador.');
                            }

                            localStorage.setItem('user_id', data.user.id);
                            localStorage.setItem('user_role', profile.role);
                            localStorage.setItem('user_branch', profile.branch);

                            this.showSuccess('¡Bienvenido al sistema!');

                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 1000);
                        }

                    } catch (err) {
                        console.error('Error login:', err);
                        this.errorMessage = err.message || 'Error al iniciar sesión';
                        this.showError(this.errorMessage);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>

</html>
