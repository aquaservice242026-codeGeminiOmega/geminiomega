<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaService - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>

    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- Toastify JS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #0891b2 100%);
            min-height: 100vh;
        }

        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #0284c7 0%, #0891b2 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Toastify custom styles */
        .toastify {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            border-radius: 12px !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15) !important;
            padding: 14px 20px !important;
            min-width: 280px;
        }

        .toastify-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;
        }

        .toastify-error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%) !important;
        }

        .toastify-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%) !important;
        }

        .toastify-info {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%) !important;
        }

        .water-drop {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="flex items-center justify-center p-4">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <div class="w-full max-w-md fade-in">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="water-drop inline-block mb-4">
                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg">
                    <i class="fas fa-tint text-4xl text-cyan-500"></i>
                </div>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">AquaService</h1>
            <p class="text-blue-100">Sistema de Gestión de Agua Potabilizada</p>
        </div>

        <!-- Login Card -->
        <div class="login-card rounded-2xl shadow-2xl p-8">
            <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Iniciar Sesión</h2>

            <form @submit.prevent="login" x-data="loginApp()">
                <!-- Email -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Correo Electrónico</label>
                    <div class="relative">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" x-model="email" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition"
                            placeholder="usuario@aquaservice.com" autocomplete="email">
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                    <div class="relative">
                        <i class="fas fa-lock input-icon"></i>
                        <input :type="showPassword ? 'text' : 'password'" x-model="password" required
                            class="w-full pl-10 pr-12 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition"
                            placeholder="••••••••" autocomplete="current-password">
                        <button type="button" @click="showPassword = !showPassword"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas" :class="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" :disabled="loading"
                    class="btn-primary w-full text-white font-semibold py-3 rounded-lg flex items-center justify-center space-x-2">
                    <i class="fas fa-circle-notch fa-spin" x-show="loading"></i>
                    <i class="fas fa-sign-in-alt" x-show="!loading"></i>
                    <span x-text="loading ? 'Ingresando...' : 'Ingresar'"></span>
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-6 text-center">
                <p class="text-xs text-gray-500">
                    <i class="fas fa-shield-alt mr-1"></i>
                    Conexión segura con Supabase
                </p>
            </div>
        </div>

        <!-- Copyright -->
        <div class="text-center mt-6">
            <p class="text-sm text-blue-100">
                &copy; 2026 AquaService. Todos los derechos reservados.
            </p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://wotoslngwrsddohowkba.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvdG9zbG5nd3JzZGRvaG93a2JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMDk5MTksImV4cCI6MjA5ODc4NTkxOX0.zvce9AmOBwPxmtOikfyT0FdbyGF0Szec-AZfTiYqzBs';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================
        // SISTEMA DE NOTIFICACIONES TOASTIFY
        // ============================================
        function showToast(message, type = 'success') {
            const gradients = {
                success: 'linear-gradient(to right, #10b981, #059669)',
                error: 'linear-gradient(to right, #ef4444, #dc2626)',
                warning: 'linear-gradient(to right, #f59e0b, #d97706)',
                info: 'linear-gradient(to right, #3b82f6, #2563eb)'
            };

            const icons = {
                success: '✓',
                error: '✗',
                warning: '⚠',
                info: 'ℹ'
            };

            Toastify({
                text: `${icons[type]} ${message}`,
                duration: 3000,
                close: true,
                gravity: 'top',
                position: 'right',
                stopOnFocus: true,
                style: {
                    background: gradients[type],
                    borderRadius: '12px',
                    fontFamily: 'Inter, sans-serif',
                    fontWeight: '500',
                    fontSize: '14px',
                    padding: '14px 20px',
                    boxShadow: '0 10px 25px -5px rgba(0, 0, 0, 0.15)',
                    minWidth: '280px'
                },
                onClick: function () { }
            }).showToast();
        }

        // ============================================
        // APLICACIÓN LOGIN
        // ============================================
        function loginApp() {
            return {
                email: '',
                password: '',
                showPassword: false,
                loading: false,

                async login() {
                    if (!this.email || !this.password) {
                        showToast('Por favor complete todos los campos', 'warning');
                        return;
                    }

                    this.loading = true;

                    try {
                        const { data, error } = await supabase.auth.signInWithPassword({
                            email: this.email,
                            password: this.password
                        });

                        if (error) {
                            // Mensajes personalizados según el error
                            if (error.message.includes('Invalid login credentials')) {
                                showToast('Credenciales incorrectas', 'error');
                            } else if (error.message.includes('Email not confirmed')) {
                                showToast('Email no confirmado', 'warning');
                            } else if (error.message.includes('Too many requests')) {
                                showToast('Demasiados intentos. Espere un momento', 'error');
                            } else {
                                showToast(error.message, 'error');
                            }
                            return;
                        }

                        // Login exitoso
                        showToast('¡Bienvenido al sistema!', 'success');

                        // Guardar información del usuario
                        const { data: profile } = await supabase
                            .from('profiles')
                            .select('full_name, role, branch')
                            .eq('id', data.user.id)
                            .single();

                        if (profile) {
                            localStorage.setItem('user_id', data.user.id);
                            localStorage.setItem('user_name', profile.full_name);
                            localStorage.setItem('user_role', profile.role);
                            localStorage.setItem('user_branch', profile.branch);
                        }

                        // Redirigir al dashboard después de 1 segundo
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);

                    } catch (err) {
                        console.error('Error:', err);
                        showToast('Error de conexión', 'error');
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>

</html>
