<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaService - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/alertify.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/themes/bootstrap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/alertify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%); }
        .sidebar-item { transition: all 0.3s; }
        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(255, 255, 255, 0.2);
            border-left: 4px solid #fff;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 h-full w-64 gradient-bg text-white z-40 hidden lg:block">
        <div class="p-6">
            <div class="mb-6">
                <div class="flex items-center space-x-3 mb-3">
                    <i class="fas fa-tint text-3xl"></i>
                    <div>
                        <h1 class="text-xl font-bold">AquaService</h1>
                        <p class="text-xs text-blue-200">Sistema de Gestión</p>
                    </div>
                </div>
                <div class="bg-white bg-opacity-10 rounded-lg px-3 py-2">
                    <p class="text-xs text-blue-200 mb-0.5">Sucursal</p>
                    <p class="font-semibold capitalize text-sm" id="sidebar-branch">Cargando...</p>
                </div>
            </div>

            <nav class="space-y-2">
                <a href="index.html" class="sidebar-item active flex items-center space-x-3 px-4 py-3 rounded-lg">
                    <i class="fas fa-home w-5"></i><span>Dashboard</span>
                </a>
                <a href="ventas.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white hover:bg-opacity-10">
                    <i class="fas fa-shopping-cart w-5"></i><span>Ventas</span>
                </a>
                <a href="clientes.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white hover:bg-opacity-10">
                    <i class="fas fa-users w-5"></i><span>Clientes</span>
                </a>
                <a href="inventario.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white hover:bg-opacity-10">
                    <i class="fas fa-boxes w-5"></i><span>Inventario</span>
                </a>
                <a href="usuarios.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white hover:bg-opacity-10">
                    <i class="fas fa-user-cog w-5"></i><span>Usuarios</span>
                </a>
                <a href="reportes.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white hover:bg-opacity-10">
                    <i class="fas fa-chart-line w-5"></i><span>Reportes</span>
                </a>
            </nav>
        </div>

        <div class="absolute bottom-0 left-0 right-0 p-4 bg-black bg-opacity-20">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-white bg-opacity-20 flex items-center justify-center font-bold" id="user-initials">??</div>
                <div>
                    <p class="text-sm font-medium" id="user-name">Usuario</p>
                    <p class="text-xs text-blue-200 capitalize" id="user-role">Cargando...</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="lg:ml-64 min-h-screen flex flex-col">
        
        <!-- Header -->
        <header class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">Dashboard</h2>
                <p class="text-sm text-gray-500">Resumen del negocio</p>
            </div>
            <div class="flex items-center space-x-4">
                <div class="bg-blue-50 px-4 py-2 rounded-lg">
                    <span class="text-sm font-bold text-blue-600">Tasa: Bs. 38.50</span>
                </div>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
                    <i class="fas fa-sign-out-alt mr-2"></i>Salir
                </button>
            </div>
        </header>

        <!-- Content -->
        <main class="flex-1 p-6 space-y-6">

            <!-- Tarjetas Simples -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white rounded-xl shadow p-4">
                    <p class="text-xs text-gray-600">Ventas Hoy</p>
                    <p class="text-2xl font-bold text-blue-600">5</p>
                </div>
                <div class="bg-white rounded-xl shadow p-4">
                    <p class="text-xs text-gray-600">Ingresos</p>
                    <p class="text-2xl font-bold text-green-600">$50</p>
                </div>
                <div class="bg-white rounded-xl shadow p-4">
                    <p class="text-xs text-gray-600">Botellones</p>
                    <p class="text-2xl font-bold text-cyan-600">10</p>
                </div>
                <div class="bg-white rounded-xl shadow p-4">
                    <p class="text-xs text-gray-600">Por Cobrar</p>
                    <p class="text-2xl font-bold text-red-600">$100</p>
                </div>
            </div>

            <!-- Gráficos PEQUEÑOS -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div class="bg-white rounded-xl shadow p-4">
                    <h3 class="text-sm font-semibold mb-2">Ventas (3 días)</h3>
                    <div style="height: 150px; position: relative;">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow p-4">
                    <h3 class="text-sm font-semibold mb-2">Productos</h3>
                    <div style="height: 150px; position: relative;">
                        <canvas id="productChart"></canvas>
                    </div>
                </div>
            </div>

        </main>

        <footer class="bg-white border-t px-6 py-3 text-center text-xs text-gray-500">
            <p>&copy; 2026 AquaService</p>
        </footer>
    </div>

    <script>
        const SUPABASE_URL = 'https://wotoslngwrsddohowkba.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvdG9zbG5nd3JzZGRvaG93a2JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMDk5MTksImV4cCI6MjA5ODc4NTkxOX0.zvce9AmOBwPxmtOikfyT0FdbyGF0Szec-AZfTiYqzBs';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Inicialización
        document.addEventListener('DOMContentLoaded', async function() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('full_name, role, branch')
                    .eq('id', session.user.id)
                    .single();

                if (profile) {
                    document.getElementById('user-name').textContent = profile.full_name;
                    document.getElementById('user-role').textContent = profile.role;
                    document.getElementById('sidebar-branch').textContent = profile.branch;
                    const initials = profile.full_name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                    document.getElementById('user-initials').textContent = initials;
                }
            } catch (err) {
                console.error('Error:', err);
            }

            // Crear gráficos con DATOS MÍNIMOS
            setTimeout(() => {
                createSmallCharts();
            }, 100);
        });

        function createSmallCharts() {
            // Gráfico 1: Ventas - DATOS MUY PEQUEÑOS
            const salesCtx = document.getElementById('salesChart');
            if (salesCtx) {
                new Chart(salesCtx, {
                    type: 'bar',
                    data: {
                        labels: ['Lun', 'Mar', 'Mié'],
                        datasets: [{
                            label: 'Ventas',
                            data: [10, 15, 12],  // Valores MUY pequeños
                            backgroundColor: '#0ea5e9',
                            barThickness: 20
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 20,  // Límite máximo bajo
                                ticks: { stepSize: 5 }
                            },
                            x: {
                                grid: { display: false }
                            }
                        }
                    }
                });
            }

            // Gráfico 2: Productos - DATOS MÍNIMOS
            const productCtx = document.getElementById('productChart');
            if (productCtx) {
                new Chart(productCtx, {
                    type: 'pie',
                    data: {
                        labels: ['5L', '10L', '20L'],
                        datasets: [{
                            data: [3, 4, 3],  // Valores mínimos
                            backgroundColor: ['#06b6d4', '#0ea5e9', '#0284c7']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { 
                                position: 'right',
                                labels: { 
                                    boxWidth: 10,
                                    padding: 5,
                                    font: { size: 10 }
                                }
                            }
                        }
                    }
                });
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
